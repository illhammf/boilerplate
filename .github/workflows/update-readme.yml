name: 🚀 Auto Update README Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 📊 Fetch Repository Stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          repo="${{ github.repository }}"

          CLONES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/$repo/traffic/clones)
          VIEWS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/$repo/traffic/views)
          META=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/$repo)

          CLONE_COUNT=$(echo "$CLONES" | jq '.count // 0')
          UNIQUE_CLONE=$(echo "$CLONES" | jq '.uniques // 0')
          VIEW_COUNT=$(echo "$VIEWS" | jq '.count // 0')
          UNIQUE_VIEW=$(echo "$VIEWS" | jq '.uniques // 0')
          STARS=$(echo "$META" | jq '.stargazers_count // 0')
          FORKS=$(echo "$META" | jq '.forks_count // 0')
          ISSUES=$(echo "$META" | jq '.open_issues_count // 0')
          UPDATED=$(TZ="Asia/Jakarta" date +'%d %B %Y, %H:%M WIB')

          sed -i "s|<!--CLONE_COUNT-->.*|<!--CLONE_COUNT--> $CLONE_COUNT |" README.md
          sed -i "s|<!--UNIQUE_CLONE-->.*|<!--UNIQUE_CLONE--> $UNIQUE_CLONE |" README.md
          sed -i "s|<!--VIEW_COUNT-->.*|<!--VIEW_COUNT--> $VIEW_COUNT |" README.md
          sed -i "s|<!--UNIQUE_VIEWS-->.*|<!--UNIQUE_VIEWS--> $UNIQUE_VIEW |" README.md
          sed -i "s|<!--STARS-->.*|<!--STARS--> $STARS |" README.md
          sed -i "s|<!--FORKS-->.*|<!--FORKS--> $FORKS |" README.md
          sed -i "s|<!--ISSUES-->.*|<!--ISSUES--> $ISSUES |" README.md
          sed -i "s|<!--LAST_UPDATED-->.*|<!--LAST_UPDATED--> $UPDATED |" README.md

      - name: 🤖 Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "🤖 auto: update README stats" || echo "No changes to commit"
          git push